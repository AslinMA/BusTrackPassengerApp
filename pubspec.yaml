name: bus_track_passenger
description: "BusTrack Sri Lanka - Real-time bus tracking passenger app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  permission_handler: ^11.0.1
  http: ^1.1.0
  socket_io_client: ^2.0.3
  provider: ^6.1.1
  flutter_polyline_points: ^2.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
